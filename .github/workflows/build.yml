name: Build VibiPass for All Platforms

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y python3-gi python3-gi-cairo gir1.2-gtk-3.0 gir1.2-webkit2-4.0 libgtk-3-dev libwebkit2gtk-4.0-dev dpkg fakeroot
      - name: Install Python dependencies
        run: pip install pywebview pyinstaller --upgrade
      - name: Build
        run: pyinstaller vibipass.spec --clean --noconfirm
      - name: Portable tarball
        run: cd dist && tar -czf VibiPass_linux_portable.tar.gz VibiPass/
      - name: Build deb
        run: |
          VERSION="1.0" && ARCH="amd64" && PKG="vibipass_${VERSION}_${ARCH}"
          mkdir -p dist/${PKG}/DEBIAN dist/${PKG}/usr/local/bin dist/${PKG}/usr/local/lib/vibipass dist/${PKG}/usr/share/applications dist/${PKG}/usr/share/pixmaps
          cp -r dist/VibiPass/* dist/${PKG}/usr/local/lib/vibipass/
          printf '#!/bin/bash\nexec /usr/local/lib/vibipass/VibiPass "$@"\n' > dist/${PKG}/usr/local/bin/vibipass
          chmod +x dist/${PKG}/usr/local/bin/vibipass
          printf '[Desktop Entry]\nVersion=1.0\nType=Application\nName=VibiPass\nExec=/usr/local/bin/vibipass\nIcon=vibipass\nTerminal=false\nCategories=Utility;Security;\n' > dist/${PKG}/usr/share/applications/vibipass.desktop
          cp assets/theme/Red/credentials.png dist/${PKG}/usr/share/pixmaps/vibipass.png 2>/dev/null || true
          printf "Package: vibipass\nVersion: ${VERSION}\nSection: utils\nPriority: optional\nArchitecture: ${ARCH}\nDepends: python3, gir1.2-webkit2-4.0, libgtk-3-0\nMaintainer: VibiPass\nDescription: VibiPass Secure Password Manager\n" > dist/${PKG}/DEBIAN/control
          fakeroot dpkg-deb --build dist/${PKG} dist/vibipass_1.0_amd64.deb
      - uses: actions/upload-artifact@v4
        with:
          name: VibiPass-Linux
          path: |
            dist/VibiPass_linux_portable.tar.gz
            dist/vibipass_1.0_amd64.deb

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install pywebview pyinstaller pythonnet --upgrade
      - name: Build
        run: pyinstaller vibipass.spec --clean --noconfirm
      - name: Portable ZIP
        run: Compress-Archive -Path dist\VibiPass\* -DestinationPath dist\VibiPass_windows_portable.zip -Force
        shell: powershell
      - name: Install Inno Setup
        run: choco install innosetup --yes
        shell: powershell
      - name: Build installer
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" vibipass_installer.iss'
        shell: powershell
      - uses: actions/upload-artifact@v4
        with:
          name: VibiPass-Windows
          path: |
            dist\VibiPass_windows_portable.zip
            dist\VibiPass_Setup_1.0.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install pywebview pyinstaller --upgrade
      - name: Build
        run: pyinstaller vibipass.spec --clean --noconfirm
      - name: Build DMG
        run: |
          mkdir -p dist/dmg_staging
          cp -r dist/VibiPass.app dist/dmg_staging/
          ln -s /Applications dist/dmg_staging/Applications
          hdiutil create -volname "VibiPass" -srcfolder dist/dmg_staging -ov -format UDZO dist/VibiPass_1.0.dmg
      - uses: actions/upload-artifact@v4
        with:
          name: VibiPass-macOS
          path: dist/VibiPass_1.0.dmg

  release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "VibiPass v1.0.${{ github.run_number }}"
          body: |
            ## VibiPass — Secure Password Manager
            | Platform | File |
            |----------|------|
            | 🐧 Linux .deb | vibipass_1.0_amd64.deb |
            | 🐧 Linux portable | VibiPass_linux_portable.tar.gz |
            | 🪟 Windows installer | VibiPass_Setup_1.0.exe |
            | 🪟 Windows portable | VibiPass_windows_portable.zip |
            | 🍎 macOS | VibiPass_1.0.dmg |
          files: |
            artifacts/VibiPass-Linux/VibiPass_linux_portable.tar.gz
            artifacts/VibiPass-Linux/vibipass_1.0_amd64.deb
            artifacts/VibiPass-Windows/VibiPass_windows_portable.zip
            artifacts/VibiPass-Windows/VibiPass_Setup_1.0.exe
            artifacts/VibiPass-macOS/VibiPass_1.0.dmg
