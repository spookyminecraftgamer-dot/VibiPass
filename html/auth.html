<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VibiPass - Authenticate</title>
    <style>
        :root { --accent: #1DB954; --accent-hover: #1ed760; --accent-glow: rgba(29,185,84,0.35); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            margin: 0;
            background: url('../assets/theme/Green/password_manager_theme_background_green.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white; font-family: 'Segoe UI', sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
        }
        body::before { content:''; position:fixed; inset:0; background:rgba(0,0,0,0.52); backdrop-filter:blur(2px); z-index:0; }
        .auth-box {
            position:relative; z-index:1;
            background:rgba(10,12,10,0.88); border:1px solid var(--accent);
            padding:40px 38px 36px; border-radius:20px; text-align:center;
            backdrop-filter:blur(20px);
            box-shadow:0 0 50px var(--accent-glow),0 0 100px rgba(29,185,84,0.06);
            width:420px; animation:fadeIn 0.6s ease;
        }
        @keyframes fadeIn{from{opacity:0;transform:translateY(22px);}to{opacity:1;transform:translateY(0);}}
        .welcome-name { font-size:0.68rem; letter-spacing:3px; text-transform:uppercase; color:var(--accent); font-weight:700; margin-bottom:10px; }
        h1 { font-size:1.7rem; font-weight:900; letter-spacing:2px; color:#fff; margin-bottom:4px; text-transform:uppercase; }
        .subtitle { font-size:0.78rem; color:rgba(255,255,255,0.35); letter-spacing:1px; margin-bottom:24px; }
        .progress-dots { display:flex; gap:10px; justify-content:center; margin-bottom:26px; }
        .dot { width:9px; height:9px; border-radius:50%; background:rgba(255,255,255,0.15); transition:background 0.3s,box-shadow 0.3s; }
        .dot.active { background:var(--accent); box-shadow:0 0 10px var(--accent-glow); }
        .step-label { font-size:0.68rem; color:var(--accent); letter-spacing:2.5px; text-transform:uppercase; margin-bottom:16px; font-weight:700; }
        .step { display:none; }
        .step.active { display:block; }
        input[type="password"],input[type="text"] {
            width:100%; padding:13px 16px; background:rgba(255,255,255,0.06);
            border:1px solid rgba(255,255,255,0.12); color:white; margin-bottom:14px;
            outline:none; border-radius:10px; font-size:0.95rem;
            transition:border-color 0.25s,box-shadow 0.25s;
        }
        input[type="password"]:focus,input[type="text"]:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(29,185,84,0.13); }
        input::placeholder { color:rgba(255,255,255,0.28); }
        .main-btn {
            width:100%; background:var(--accent); color:#000; border:none;
            padding:14px; font-weight:800; font-size:0.95rem; cursor:pointer;
            border-radius:10px; letter-spacing:1px; margin-top:4px;
            transition:background 0.2s,box-shadow 0.2s,transform 0.1s;
        }
        .main-btn:hover { background:var(--accent-hover); box-shadow:0 0 22px var(--accent-glow); }
        .main-btn:active { transform:scale(0.98); }
        .main-btn:disabled { opacity:0.5; cursor:not-allowed; }
        .err { color:#ff5555; font-size:0.79rem; margin-top:-8px; margin-bottom:10px; display:none; text-align:left; }
        .captcha-block { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1); border-radius:12px; padding:16px; margin-bottom:14px; }
        .captcha-block p { font-size:0.68rem; color:rgba(255,255,255,0.35); letter-spacing:1.5px; text-transform:uppercase; margin-bottom:12px; }
        #auth-captcha-svg { display:block; margin:0 auto; border-radius:8px; }
        .captcha-input-row { display:flex; gap:8px; margin-top:12px; align-items:center; }
        .captcha-input-row input[type="text"] { flex:1; margin-bottom:0; padding:12px 14px; font-size:1rem; letter-spacing:3px; font-weight:600; }
        .refresh-btn {
            flex-shrink:0; width:44px; height:44px; background:rgba(255,255,255,0.06);
            border:1px solid rgba(255,255,255,0.15); color:rgba(255,255,255,0.5);
            border-radius:10px; cursor:pointer; font-size:1.1rem;
            display:flex; align-items:center; justify-content:center;
            transition:border-color 0.2s,color 0.2s,background 0.2s;
        }
        .refresh-btn:hover { border-color:var(--accent); color:var(--accent); background:rgba(29,185,84,0.08); }
        .loading-msg { font-size:0.82rem; color:var(--accent); margin-top:10px; display:none; }
        .shake { animation:shake 0.4s ease; }
        @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 60%{transform:translateX(8px)} 80%{transform:translateX(-4px)} }
    </style>
</head>
<body>
    <div class="auth-box" id="auth-box">
        <p class="welcome-name" id="welcome-name">Welcome back</p>
        <h1>VibiPass</h1>
        <p class="subtitle">Verify your identity to continue</p>
        <div class="progress-dots">
            <div class="dot active" id="dot1"></div>
            <div class="dot" id="dot2"></div>
        </div>

        <!-- Step 1: Master Password -->
        <div class="step active" id="step-1">
            <div class="step-label">Step 1 of 2 — Master Password</div>
            <input type="password" id="app-pass" placeholder="Enter master app password" autofocus>
            <div class="err" id="err1">Incorrect password.</div>
            <div class="loading-msg" id="load1">⏳ Verifying...</div>
            <button class="main-btn" id="btn1" onclick="checkApp()">Continue →</button>
        </div>

        <!-- Step 2: Device Password + Captcha -->
        <div class="step" id="step-2">
            <div class="step-label">Step 2 of 2 — Device Password &amp; Verification</div>
            <input type="password" id="dev-pass" placeholder="Enter your device password">
            <div class="err" id="err2">Incorrect device password.</div>
            <div class="captcha-block">
                <p>Type the characters shown below</p>
                <div id="auth-captcha-svg" style="width:310px;height:78px;"></div>
                <div class="captcha-input-row">
                    <input type="text" id="auth-captcha-input" placeholder="Characters here..." autocomplete="off" maxlength="6">
                    <button class="refresh-btn" onclick="generateAuthCaptcha()">↺</button>
                </div>
            </div>
            <div class="err" id="err3">Incorrect captcha.</div>
            <div class="loading-msg" id="load2">⏳ Verifying...</div>
            <button class="main-btn" id="btn2" onclick="checkDevAndCaptcha()">Unlock Vault →</button>
        </div>
    </div>

    <script>
        const VCrypto = (() => {
            const PBKDF2_ITERATIONS = 100000;
            function bufToHex(buf){return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');}
            function hexToBuf(hex){const b=new Uint8Array(hex.length/2);for(let i=0;i<hex.length;i+=2)b[i/2]=parseInt(hex.substr(i,2),16);return b.buffer;}
            async function verifyPassword(password, stored) {
                const [saltHex,hashHex]=stored.split(':');
                const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(password),{name:'PBKDF2'},false,['deriveBits']);
                const hash=await crypto.subtle.deriveBits({name:'PBKDF2',salt:hexToBuf(saltHex),iterations:PBKDF2_ITERATIONS,hash:'SHA-256'},km,256);
                return bufToHex(hash)===hashHex;
            }
            return { verifyPassword };
        })();

        const THEME_MAP = {
            'baby_pink':{folder:'Baby_Pink',color:'#ff80ab'},'black':{folder:'Black',color:'#aaaaaa'},
            'cyan':{folder:'Cyan',color:'#00e5ff'},'dark_blue':{folder:'Dark_Blue',color:'#4488ff'},
            'green':{folder:'Green',color:'#1DB954'},'orange':{folder:'Orange',color:'#ff8c00'},
            'purple':{folder:'Purple',color:'#bb86fc'},'red':{folder:'Red',color:'#ff4444'},
            'yellow':{folder:'Yellow',color:'#ffd600'},
        };

        let authCaptchaText = '';
        const CAPTCHA_CHARS = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';

        function generateAuthCaptcha() {
            authCaptchaText = Array.from({length:6},()=>CAPTCHA_CHARS[Math.floor(Math.random()*CAPTCHA_CHARS.length)]).join('');
            const inp = document.getElementById('auth-captcha-input');
            if(inp) inp.value = '';
            const colors = ['#1DB954','#ffffff','#a0ffcc','#00e676','#69f0ae'];
            let svgContent = `<svg xmlns="http://www.w3.org/2000/svg" width="310" height="78" style="background:rgba(10,20,10,0.9);">`;
            for(let i=0;i<80;i++){
                const x=Math.random()*310, y=Math.random()*78;
                svgContent+=`<circle cx="${x}" cy="${y}" r="1" fill="${colors[Math.floor(Math.random()*colors.length)]}" opacity="0.3"/>`;
            }
            for(let i=0;i<4;i++){
                const x1=Math.random()*310,y1=Math.random()*78,x2=Math.random()*310,y2=Math.random()*78;
                svgContent+=`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="rgba(100,200,100,0.15)" stroke-width="1.5"/>`;
            }
            authCaptchaText.split('').forEach((ch,i)=>{
                const x=26+i*44, y=42+(Math.random()-0.5)*10;
                const rot=(Math.random()-0.5)*25, size=26+Math.floor(Math.random()*8);
                const color=colors[Math.floor(Math.random()*colors.length)];
                const skewX=(Math.random()-0.5)*15;
                svgContent+=`<text x="${x}" y="${y}" font-family="monospace" font-size="${size}" font-weight="bold" fill="${color}" transform="rotate(${rot},${x},${y}) skewX(${skewX})" style="user-select:none">${ch}</text>`;
            });
            for(let i=0;i<5;i++){
                const x1=Math.random()*310,y1=Math.random()*78,x2=Math.random()*310,y2=Math.random()*78;
                svgContent+=`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="rgba(180,180,180,0.18)" stroke-width="1.5"/>`;
            }
            svgContent+=`</svg>`;
            const encoded = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svgContent);
            const img = document.createElement('img');
            img.src = encoded;
            img.width = 310;
            img.height = 78;
            img.style.borderRadius = '8px';
            img.style.display = 'block';
            img.style.margin = '0 auto';
            const container = document.getElementById('auth-captcha-svg');
            container.innerHTML = '';
            container.appendChild(img);
        }

        function applyTheme() {
            const key = localStorage.getItem('sentinel_img') || 'green';
            const theme = THEME_MAP[key] || THEME_MAP['green'];
            const color = localStorage.getItem('sentinel_color') || theme.color;
            const hex = color.replace('#','');
            const r=parseInt(hex.substring(0,2),16),g=parseInt(hex.substring(2,4),16),b=parseInt(hex.substring(4,6),16);
            document.documentElement.style.setProperty('--accent', color);
            document.documentElement.style.setProperty('--accent-hover', color);
            document.documentElement.style.setProperty('--accent-glow', `rgba(${r},${g},${b},0.38)`);
            document.body.style.backgroundImage = `url('../assets/theme/${theme.folder}/password_manager_theme_background_${key}.jpg')`;
        }

        function initPage() {
            try {
                if(!localStorage.getItem('vibipass_profile')) {
                    window.location.href = 'landing.html';
                    return;
                }
                applyTheme();
                const profile = JSON.parse(localStorage.getItem('vibipass_profile') || '{}');
                if(profile.name) document.getElementById('welcome-name').innerText = `Welcome back, ${profile.name.toUpperCase()}`;
            } catch(e) {
                setTimeout(initPage, 100);
            }
        }

        document.addEventListener('keydown', e => {
            if(e.key !== 'Enter') return;
            if(document.getElementById('step-1').classList.contains('active')) checkApp();
            else if(document.getElementById('step-2').classList.contains('active')) checkDevAndCaptcha();
        });

        async function checkApp() {
            const val = document.getElementById('app-pass').value;
            const stored = localStorage.getItem('sentinel_app_pass');
            if(!stored){ alert('No profile found.'); return; }
            document.getElementById('btn1').disabled = true;
            document.getElementById('load1').style.display = 'block';
            document.getElementById('err1').style.display = 'none';
            try {
                const ok = await VCrypto.verifyPassword(val, stored);
                if(ok) {
                    sessionStorage.setItem('vp_session_key', val);
                    document.getElementById('step-1').classList.remove('active');
                    document.getElementById('step-2').classList.add('active');
                    document.getElementById('dot2').classList.add('active');
                    generateAuthCaptcha();
                    setTimeout(() => document.getElementById('dev-pass').focus(), 50);
                } else {
                    document.getElementById('err1').style.display = 'block';
                    document.getElementById('app-pass').value = '';
                    shakeBox();
                }
            } finally {
                document.getElementById('btn1').disabled = false;
                document.getElementById('load1').style.display = 'none';
            }
        }

        async function checkDevAndCaptcha() {
            const devVal = document.getElementById('dev-pass').value;
            const captchaVal = document.getElementById('auth-captcha-input').value.toUpperCase().replace(/\s/g,'');
            const storedDev = localStorage.getItem('sentinel_dev_pass');
            document.getElementById('btn2').disabled = true;
            document.getElementById('load2').style.display = 'block';
            document.getElementById('err2').style.display = 'none';
            document.getElementById('err3').style.display = 'none';
            try {
                const devOk = await VCrypto.verifyPassword(devVal, storedDev);
                const captchaOk = captchaVal === authCaptchaText;
                if(devOk && captchaOk) {
                    window.location.href = 'cred.html';
                } else {
                    if(!devOk){ document.getElementById('err2').style.display='block'; document.getElementById('dev-pass').value=''; }
                    if(!captchaOk){ document.getElementById('err3').style.display='block'; generateAuthCaptcha(); }
                    shakeBox();
                }
            } finally {
                document.getElementById('btn2').disabled = false;
                document.getElementById('load2').style.display = 'none';
            }
        }

        function shakeBox() {
            const box = document.getElementById('auth-box');
            box.classList.remove('shake'); void box.offsetWidth; box.classList.add('shake');
        }

        window.addEventListener('DOMContentLoaded', () => setTimeout(initPage, 500));
    </script>
</body>
</html>
